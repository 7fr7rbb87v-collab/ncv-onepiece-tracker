<!DOCTYPE html>
<html>
<head>
  <title>NCV One Piece Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>NCV One Piece Tracker</h1>
    <p>Live board for One Piece singles, sealed product, images, links, and price history.</p>
  </header>

  <section class="filters">
    <button onclick="filterDeals('all')">All</button>
    <button onclick="filterDeals('single')">Singles</button>
    <button onclick="filterDeals('sealed')">Sealed</button>
  </section>

  <main>
    <section id="dealsGrid" class="grid"></section>

    <section class="chartBox">
      <h2 id="chartTitle">Price History</h2>
      <canvas id="priceChart"></canvas>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

name: Update Source Pull Tracker

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run source pull tracker
        run: python tracker.py
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}

          ENABLE_EBAY: ${{ vars.ENABLE_EBAY }}
          ENABLE_EBAY_SOLD: ${{ vars.ENABLE_EBAY_SOLD }}
          ENABLE_RETAIL_SEARCH: ${{ vars.ENABLE_RETAIL_SEARCH }}
          ENABLE_TIKTOK_SEARCH: ${{ vars.ENABLE_TIKTOK_SEARCH }}

          EBAY_MARKETPLACE_ID: ${{ vars.EBAY_MARKETPLACE_ID }}
          EBAY_RESULTS_PER_PRODUCT: ${{ vars.EBAY_RESULTS_PER_PRODUCT }}
          EBAY_SOLD_RESULTS_PER_PRODUCT: ${{ vars.EBAY_SOLD_RESULTS_PER_PRODUCT }}
          EBAY_SORT: ${{ vars.EBAY_SORT }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*.json
          git commit -m "Update source pull data" || echo "No changes"
          git push
